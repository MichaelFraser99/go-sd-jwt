name: Unit Tests
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Run unit tests
        run: |
          go test ./... -v -coverprofile=coverage.out
          make fuzz

      - name: Coverage summary
        run: go tool cover -func=coverage.out
